apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-source-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openclaw-tls
spec:
  isCA: true
  secretName: openclaw-tls
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-source-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
  - openclaw.amanises.local
